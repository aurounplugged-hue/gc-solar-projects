backend:
  name: github
  repo: aurounplugged-hue/gc-solar-projects
  branch: master
  base_url: https://api.netlify.com
  auth_endpoint: auth

media_folder: "images/projects"
public_folder: "/images/projects"

collections:
  - name: "projects"
    label: "Solar Projects"
    files:
      - label: "All Projects"
        name: "all_projects"
        file: "data/projects.json"
        format: json
        fields:
          - label: "Projects"
            name: "projects"
            widget: "list"
            label_singular: "Project"
            summary: "{{fields.title}} — {{fields.capacity}}"
            fields:
              - {label: "Project Title", name: "title", widget: "string", hint: "e.g. Industrial Unit — Kakinada"}
              - {label: "Capacity", name: "capacity", widget: "string", hint: "e.g. 250 kW or 1.2 MW"}
              - label: "Project Type"
                name: "type"
                widget: "select"
                options:
                  - "Industrial Rooftop"
                  - "Commercial Rooftop"
                  - "Agricultural / Farm"
                  - "Ground Mount / Utility"
              - {label: "Location", name: "location", widget: "string", hint: "e.g. Kakinada Port Area, East Godavari"}
              - label: "Scope Tags"
                name: "scope"
                widget: "list"
                hint: "Short labels shown on the card — e.g. EPC Execution, APEPDCL Net-Metering, O&M Contract"
              - label: "Status"
                name: "status"
                widget: "select"
                options:
                  - "Completed"
                  - "Ongoing"
                  - "Pipeline"
              - label: "Project Photo"
                name: "image"
                widget: "image"
                required: false
                hint: "Upload a photo of the installation. Phone photos are fine."
